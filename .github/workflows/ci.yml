name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test-and-lint:
    name: "Test & Lint (PHP: ${{ matrix.php }}, Node: ${{ matrix.node }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2"]
        node: ["22"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, bcmath, intl, sqlite, gd
          tools: composer:v2

      - name: Setup composer cache & vendor cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install PHP dependencies (composer)
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install NPM dependencies
        run: npm ci --no-audit --no-progress

      - name: Prepare environment (sqlite + Laravel)
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: |
          cp .env.example .env
          php -r "file_exists('database/database.sqlite') || touch('database/database.sqlite');"
          php artisan key:generate --ansi
          php artisan migrate --force --no-interaction

      - name: Build frontend (Vite)
        run: npm run build

      - name: Run PHPUnit
        run: composer run test -- --testdox

      - name: Run PHPStan (static analysis)
        run: composer run analyse

      - name: Run PHP-CS-Fixer (lint check)
        run: composer run lint

      - name: Prettier check (blade + frontend files)
        run: |
          npx prettier --version
          npx prettier --check "resources/views/**/*.blade.php" || (echo "Prettier check failed" && exit 1)
