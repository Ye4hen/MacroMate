name: CI

on:
  push: { branches: [main, dev] }
  pull_request: { branches: [main, dev] }

jobs:
  frontend-setup:
    name: Frontend setup (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install NPM dependencies
        run: npm ci --no-audit --no-progress

      - name: Build frontend (Vite)
        run: npm run build

      - name: Upload built assets
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: public/build

  phpunit:
    name: PHPUnit (PHP 8.2)
    runs-on: ubuntu-latest
    needs: frontend-setup
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, bcmath, intl, sqlite, gd
          tools: composer:v2

      - name: Setup composer cache & vendor cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare environment
        run: |
          cp .env.example .env
          php -r "file_exists('database/database.sqlite') || touch('database/database.sqlite');"
          php artisan key:generate --ansi

      - name: Run PHPUnit
        run: composer test -- --testdox

  phpstan:
    name: PHPStan (static analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, bcmath, intl, sqlite, gd
          tools: composer:v2

      - name: Setup composer cache & vendor cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Debug larastan & phpstan
        run: |
          echo "PWD=$(pwd)"
          php -r "echo file_exists('vendor/larastan/larastan/extension.neon') ? 'ok1\n' : 'no1\n'; echo file_exists('vendor/larastan/extension.neon') ? 'ok2\n' : 'no2\n';"
          ls -la vendor/larastan || true
          ls -la vendor/bin || true
          ./vendor/bin/phpstan --version || true

      - name: Run PHPStan
        run: composer exec -- phpstan analyse --memory-limit=2G

  php-cs-fixer:
    name: PHP-CS-Fixer (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          tools: composer:v2

      - name: Setup composer cache & vendor cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run php-cs-fixer (dry-run)
        run: composer run lint

  prettier:
    name: Prettier (format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install NPM dependencies
        run: npm ci --no-audit --no-progress

      - name: Prettier check
        run: npm run format
