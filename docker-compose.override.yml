services:
  node:
    image: node:22
    working_dir: /app
    volumes:
      - ./:/app:delegated
      - node_modules:/app/node_modules
    command: sh -c "npm ci --no-audit --no-progress && npm run dev"
    ports:
      - "1488:1488"
    environment:
      - CHOKIDAR_USEPOLLING=${CHOKIDAR_USEPOLLING:-false}

  app:
    image: macromate-app:local
    env_file: .env
    environment:
      - APP_ENV=local
      - DB_HOST=db
      - REDIS_HOST=redis
    # overlay only the app files you edit to avoid hiding vendor/public/build from image
    volumes:
      - ./app:/var/www/html/app:delegated
      - ./routes:/var/www/html/routes:delegated
      - ./resources:/var/www/html/resources:delegated
      - ./config:/var/www/html/config:delegated
      - ./database:/var/www/html/database:delegated
      - ./public/uploads:/var/www/html/public/uploads:delegated
      - ./storage:/var/www/html/storage:delegated     # mount host storage for dev
      - ~/.composer/cache:/root/.composer/cache
    depends_on:
      - node
      - db
      - redis
    ports:
      - "9000:9000"