services:
  app:
    build: .
    image: macromate-app:local
    environment:
      - APP_ENV=local
      - DB_HOST=db
      - REDIS_HOST=redis
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:stable-alpine
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www/html
    depends_on:
      - app

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  worker:
    build: .
    command: php artisan queue:work --sleep=3 --tries=3
    depends_on:
      - app
      - redis
      - db

volumes:
  db_data:
  redis_data:
