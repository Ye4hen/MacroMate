services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
      args:
        # default build flags (override in production compose to disable dev deps)
        COMPOSER_FLAGS: "--no-interaction --no-progress --optimize-autoloader --no-scripts"
    image: macromate-app:local
    env_file: .env
    environment:
      - APP_ENV=${APP_ENV:-local}
      - DB_HOST=db
      - REDIS_HOST=redis
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      - db
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "artisan", "--version"]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:stable-alpine
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - storage_data:/var/www/html/storage:ro
    depends_on:
      - app
    restart: unless-stopped

  db:
    image: mysql:8
    env_file: .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--silent", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    image: macromate-app:local
    env_file: .env
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=60
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      - db
      - redis
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
  storage_data:
  node_modules: