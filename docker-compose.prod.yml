services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
      args:
        COMPOSER_FLAGS: "--no-dev --no-scripts --optimize-autoloader"
    image: macromate-app:prod
    env_file: .env.prod
    environment:
      - APP_ENV=production
    volumes:
      - storage_data:/var/www/html/storage
    restart: unless-stopped
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "php", "artisan", "--version"]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:stable-alpine
    env_file: .env.prod
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - storage_data:/var/www/html/storage:ro
    depends_on:
      - app
    restart: unless-stopped

  db:
    image: mysql:8
    env_file: .env.prod
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--silent", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    image: macromate-app:prod
    env_file: .env.prod
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=60
    volumes:
      - storage_data:/var/www/html/storage
    restart: unless-stopped
    depends_on:
      - db
      - redis

volumes:
  db_data:
  redis_data:
  storage_data:
